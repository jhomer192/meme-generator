<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/meme-generator/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Generator</title>
    <script>
      (function() {
        var old = ['mocha', 'tokyo-night', 'dracula', 'nord', 'forest'];
        var stored = localStorage.getItem('site-theme');
        document.documentElement.setAttribute('data-theme', (stored && old.indexOf(stored) === -1) ? stored : 'tokyo');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
